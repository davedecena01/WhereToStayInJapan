<div class="app-shell">
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <nav class="app-nav" aria-label="Site navigation">
    <a class="nav-brand" routerLink="/">
      <span class="nav-logo">🌸</span>
      Where To Stay in Japan
    </a>
  </nav>

  @if (showResumeBanner()) {
    <div class="resume-banner" role="status">
      <span>You have a saved itinerary. Want to resume where you left off?</span>
      <div class="banner-actions">
        <button class="btn-resume" (click)="resumeSession()">Resume Search</button>
        <button class="btn-dismiss" (click)="dismissResumeBanner()">Dismiss</button>
      </div>
    </div>
  }

  <main id="main-content">
    <router-outlet />
  </main>
</div>
